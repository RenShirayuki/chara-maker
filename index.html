<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Maker</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="container">
  <h1>Character Maker</h1>
  <p class="subtitle">Forge your identity</p>

  <div class="photo-section">
    <label style="text-align:center">Portrait</label>
    <div class="photo-drop" id="photoDrop" onclick="document.getElementById('photoInput').click()">
      <span class="placeholder">+</span>
      <img id="photoPreview" alt="">
    </div>
    <input type="file" id="photoInput" accept="image/*" hidden onchange="onPhotoSelect(this)">
    <div class="photo-hint">Click to upload</div>
    <div class="photo-actions" id="photoActions">
      <button onclick="openEditor()">✎ Edit</button>
      <button onclick="removePhoto()">✕ Remove</button>
    </div>
  </div>

  <div class="field">
    <label>Name</label>
    <input type="text" id="name" placeholder="Enter character name" maxlength="50">
  </div>

  <div class="row">
    <div class="field">
      <label>Age</label>
      <input type="number" id="age" placeholder="—" min="0" max="99999">
    </div>
    <div class="field">
      <label>Gender</label>
      <div class="gender-options">
        <div class="gender-opt" data-g="Male" onclick="pickGender(this)">Male</div>
        <div class="gender-opt" data-g="Female" onclick="pickGender(this)">Female</div>
        <div class="gender-opt" data-g="Neutral" onclick="pickGender(this)">Neutral</div>
      </div>
      <div class="gender-note" id="genderNote">⚬ Gender set to Neutral by race</div>
    </div>
  </div>

  <div class="field">
    <label>Race</label>
    <select id="race" onchange="onRaceChange(this)">
      <option value="">Select…</option>
      <option>Aasimar</option><option>Automaton</option><option>Bugbear</option>
      <option>Changeling</option><option>Construct</option><option>Dragonborn</option>
      <option>Dwarf</option><option>Elemental</option><option>Elf</option>
      <option>Firbolg</option><option>Genasi</option><option>Gnome</option>
      <option>Goblin</option><option>Golem</option><option>Goliath</option>
      <option>Half-Elf</option><option>Half-Orc</option><option>Halfling</option>
      <option>Homunculus</option><option>Human</option><option>Kalashtar</option>
      <option>Kenku</option><option>Kobold</option><option>Lizardfolk</option>
      <option>Modron</option><option>Ooze</option><option>Orc</option>
      <option>Phantom</option><option>Shadow</option><option>Shifter</option>
      <option>Slime</option><option>Spirit</option><option>Tabaxi</option>
      <option>Tiefling</option><option>Triton</option><option>Undead</option>
      <option value="__custom">✎ Custom…</option>
    </select>
    <input type="text" class="custom-input" id="raceCustom" placeholder="Type race…" maxlength="40" oninput="checkCustomRace()">
  </div>

  <div class="field">
    <label>Class</label>
    <select id="charClass" onchange="toggleCustom(this,'classCustom')">
      <option value="">Select…</option>
      <option>Artificer</option><option>Barbarian</option><option>Bard</option>
      <option>Blood Hunter</option><option>Cleric</option><option>Druid</option>
      <option>Fighter</option><option>Monk</option><option>Necromancer</option>
      <option>Paladin</option><option>Psion</option><option>Ranger</option>
      <option>Rogue</option><option>Samurai</option><option>Sorcerer</option>
      <option>Warlock</option><option>Witch</option><option>Wizard</option>
      <option value="__custom">✎ Custom…</option>
    </select>
    <input type="text" class="custom-input" id="classCustom" placeholder="Type class…" maxlength="40">
  </div>

  <div class="field">
    <label>Personality</label>
    <textarea id="personality" placeholder="Describe their temperament, quirks, flaws, virtues…" maxlength="500"></textarea>
  </div>

  <button onclick="generate()">Create Character</button>

  <div class="card-wrapper" id="cardWrapper">
    <div class="adv-card" id="advCard">
      <div class="card-header">
        <div class="guild">Adventurer's Guild</div>
        <div class="title">Registration Card</div>
      </div>
      <div class="card-body">
        <div class="card-photo" id="cardPhoto"><span class="no-photo">◌</span></div>
        <div class="card-info">
          <div class="card-name" id="cardName"></div>
          <div class="card-stat"><span class="k">Age</span><span class="v" id="cardAge"></span></div>
          <div class="card-stat"><span class="k">Gender</span><span class="v" id="cardGender"></span></div>
          <div class="card-stat"><span class="k">Race</span><span class="v" id="cardRace"></span></div>
          <div class="card-stat"><span class="k">Class</span><span class="v" id="cardClass"></span></div>
        </div>
      </div>
      <div class="card-footer">
        <span id="cardId"></span>
        <span>Verified ✓</span>
      </div>
    </div>
    <div class="btn-row">
      <button onclick="downloadCard()">Download Card</button>
      <button class="btn-secondary" onclick="resetForm()">Start Over</button>
    </div>
  </div>

  <div class="nav-link"><a href="decode.html">Forgot their true nature? Reveal a sealed card →</a></div>
</div>

<!-- EDITOR -->
<div class="modal-overlay" id="editorModal">
  <div class="modal">
    <div class="modal-head">
      <span>Edit Portrait</span>
      <button class="modal-close" onclick="closeEditor()">✕</button>
    </div>
    <div class="modal-body">
      <canvas id="editorCanvas" width="1000" height="1000"></canvas>
      <button class="rotate-btn" onclick="editorRotate(90)" title="Rotate">↻</button>
    </div>
    <div class="modal-foot">
      <button onclick="applyEditor()">Apply</button>
      <button class="btn-cancel" onclick="closeEditor()">Cancel</button>
    </div>
  </div>
</div>

<script src="stego.js"></script>
<script>
let selectedGender='', photoDataURL=null, stegoPayload='';
const GENDERLESS=['automaton','construct','elemental','golem','homunculus','modron','ooze','phantom','shadow','slime','spirit','undead'];

/* PHOTO */
function onPhotoSelect(input){
  const f=input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{
    photoDataURL=e.target.result;
    document.getElementById('photoPreview').src=photoDataURL;
    document.getElementById('photoDrop').classList.add('has-img');
    document.getElementById('photoActions').classList.add('show');
    openEditor();
  };
  r.readAsDataURL(f);
}
function removePhoto(){
  photoDataURL=null;
  document.getElementById('photoPreview').src='';
  document.getElementById('photoDrop').classList.remove('has-img');
  document.getElementById('photoActions').classList.remove('show');
  document.getElementById('photoInput').value='';
}

/* EDITOR — fixed internal canvas, Google-style */
let edImg=null, edRot=0, edZoom=1, edPanX=0, edPanY=0;
let edDragging=false, edLastX=0, edLastY=0, edPinchDist=0;
const ec=document.getElementById('editorCanvas');
const ectx=ec.getContext('2d');

function openEditor(){
  if(!photoDataURL) return;
  edImg=new Image();
  edImg.onload=()=>{
    edRot=0; edZoom=1; edPanX=0; edPanY=0;
    document.getElementById('editorModal').classList.add('show');
    drawEditor();
  };
  edImg.src=photoDataURL;
}
function closeEditor(){ document.getElementById('editorModal').classList.remove('show'); }

function cropRadius(){ return Math.min(ec.width, ec.height)*0.36; }
function rotDims(){
  const s=edRot===90||edRot===270;
  return {w:s?edImg.naturalHeight:edImg.naturalWidth, h:s?edImg.naturalWidth:edImg.naturalHeight};
}
function baseScale(){
  const d=rotDims(), r=cropRadius();
  return Math.max(r*2/d.w, r*2/d.h);
}
function clampPan(){
  const s=baseScale()*edZoom, d=rotDims(), r=cropRadius();
  const mx=(d.w*s)/2 - r, my=(d.h*s)/2 - r;
  edPanX=Math.max(-mx, Math.min(edPanX, mx));
  edPanY=Math.max(-my, Math.min(edPanY, my));
}
function drawEditor(){
  const W=ec.width, H=ec.height, cx=W/2, cy=H/2, r=cropRadius();
  const s=baseScale()*edZoom;
  ectx.clearRect(0,0,W,H);
  ectx.fillStyle='#000'; ectx.fillRect(0,0,W,H);
  ectx.save();
  ectx.beginPath(); ectx.arc(cx,cy,r,0,Math.PI*2); ectx.clip();
  ectx.translate(cx+edPanX, cy+edPanY);
  ectx.rotate(edRot*Math.PI/180);
  ectx.drawImage(edImg, -edImg.naturalWidth*s/2, -edImg.naturalHeight*s/2, edImg.naturalWidth*s, edImg.naturalHeight*s);
  ectx.restore();
  ectx.save();
  ectx.beginPath(); ectx.rect(0,0,W,H); ectx.arc(cx,cy,r,0,Math.PI*2,true);
  ectx.fillStyle='rgba(0,0,0,.55)'; ectx.fill('evenodd');
  ectx.restore();
  ectx.beginPath(); ectx.arc(cx,cy,r,0,Math.PI*2);
  ectx.strokeStyle='rgba(255,255,255,.4)'; ectx.lineWidth=2; ectx.stroke();
}
function editorRotate(d){ edRot=(edRot+d+360)%360; clampPan(); drawEditor(); }

/* mouse: drag + wheel zoom */
ec.addEventListener('mousedown', e=>{ edDragging=true; edLastX=e.clientX; edLastY=e.clientY; ec.classList.add('dragging'); });
window.addEventListener('mousemove', e=>{
  if(!edDragging) return;
  const rect=ec.getBoundingClientRect(), sx=ec.width/rect.width, sy=ec.height/rect.height;
  edPanX+=(e.clientX-edLastX)*sx; edPanY+=(e.clientY-edLastY)*sy;
  edLastX=e.clientX; edLastY=e.clientY;
  clampPan(); drawEditor();
});
window.addEventListener('mouseup', ()=>{ edDragging=false; ec.classList.remove('dragging'); });
ec.addEventListener('wheel', e=>{
  e.preventDefault();
  edZoom*= e.deltaY<0 ? 1.07 : 0.93;
  edZoom=Math.max(1, Math.min(6, edZoom));
  clampPan(); drawEditor();
}, {passive:false});

/* touch: drag + pinch zoom */
function pinchDist(t){ const dx=t[0].clientX-t[1].clientX, dy=t[0].clientY-t[1].clientY; return Math.hypot(dx,dy); }
ec.addEventListener('touchstart', e=>{
  e.preventDefault();
  if(e.touches.length===1){ edDragging=true; edLastX=e.touches[0].clientX; edLastY=e.touches[0].clientY; }
  else if(e.touches.length===2){ edDragging=false; edPinchDist=pinchDist(e.touches); }
}, {passive:false});
ec.addEventListener('touchmove', e=>{
  e.preventDefault();
  const rect=ec.getBoundingClientRect(), sx=ec.width/rect.width, sy=ec.height/rect.height;
  if(e.touches.length===1 && edDragging){
    edPanX+=(e.touches[0].clientX-edLastX)*sx; edPanY+=(e.touches[0].clientY-edLastY)*sy;
    edLastX=e.touches[0].clientX; edLastY=e.touches[0].clientY;
    clampPan(); drawEditor();
  } else if(e.touches.length===2){
    const d=pinchDist(e.touches);
    if(edPinchDist>0){ edZoom*=d/edPinchDist; edZoom=Math.max(1,Math.min(6,edZoom)); clampPan(); drawEditor(); }
    edPinchDist=d;
  }
}, {passive:false});
ec.addEventListener('touchend', e=>{
  if(e.touches.length<2) edPinchDist=0;
  if(e.touches.length===0) edDragging=false;
});

function applyEditor(){
  const r=cropRadius(), s=baseScale()*edZoom, size=r*2;
  const out=document.createElement('canvas');
  out.width=size; out.height=size;
  const ctx=out.getContext('2d');
  ctx.translate(size/2+edPanX, size/2+edPanY);
  ctx.rotate(edRot*Math.PI/180);
  ctx.drawImage(edImg, -edImg.naturalWidth*s/2, -edImg.naturalHeight*s/2, edImg.naturalWidth*s, edImg.naturalHeight*s);
  photoDataURL=out.toDataURL('image/png');
  document.getElementById('photoPreview').src=photoDataURL;
  closeEditor();
}

/* GENDER */
function pickGender(el){ if(el.classList.contains('locked')) return; document.querySelectorAll('.gender-opt').forEach(o=>o.classList.remove('active')); el.classList.add('active'); selectedGender=el.dataset.g; }
function lockGender(){ document.querySelectorAll('.gender-opt').forEach(o=>{ o.classList.remove('active'); o.classList.add('locked'); if(o.dataset.g==='Neutral') o.classList.add('active'); }); selectedGender='Neutral'; document.getElementById('genderNote').classList.add('show'); }
function unlockGender(){ document.querySelectorAll('.gender-opt').forEach(o=>o.classList.remove('locked','active')); selectedGender=''; document.getElementById('genderNote').classList.remove('show'); }

/* RACE / CUSTOM */
function onRaceChange(sel){ toggleCustom(sel,'raceCustom'); if(sel.value==='__custom'){ unlockGender(); return; } GENDERLESS.includes(sel.value.toLowerCase())?lockGender():unlockGender(); }
function checkCustomRace(){ const v=document.getElementById('raceCustom').value.trim().toLowerCase(); GENDERLESS.some(g=>v.includes(g))?lockGender():unlockGender(); }
function toggleCustom(sel,id){ const i=document.getElementById(id); if(sel.value==='__custom'){ i.classList.add('show'); i.focus(); } else { i.classList.remove('show'); i.value=''; } }
function getVal(sid,cid){ const s=document.getElementById(sid); return s.value==='__custom'?(document.getElementById(cid).value.trim()||'—'):(s.value||'—'); }

/* GENERATE */
function generate(){
  const name=document.getElementById('name').value.trim();
  if(!name){ const el=document.getElementById('name'); el.style.borderColor='#666'; el.focus(); setTimeout(()=>el.style.borderColor='',1500); return; }
  stegoPayload=document.getElementById('personality').value.trim();
  document.getElementById('cardName').textContent=name;
  document.getElementById('cardAge').textContent=document.getElementById('age').value||'—';
  document.getElementById('cardGender').textContent=selectedGender||'—';
  document.getElementById('cardRace').textContent=getVal('race','raceCustom');
  document.getElementById('cardClass').textContent=getVal('charClass','classCustom');
  document.getElementById('cardPhoto').innerHTML=photoDataURL?`<img src="${photoDataURL}" alt="">`:'<span class="no-photo">◌</span>';
  document.getElementById('cardId').textContent='AG-'+Date.now().toString(36).toUpperCase().slice(-6);
  const w=document.getElementById('cardWrapper'); w.classList.add('show'); w.scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* DOWNLOAD */
function downloadCard(){
  html2canvas(document.getElementById('advCard'),{backgroundColor:'#0a0a0a',scale:2,useCORS:true}).then(c=>{
    if(stegoPayload) encodeLSB(c, stegoPayload);
    const a=document.createElement('a');
    a.download=document.getElementById('cardName').textContent.replace(/\s+/g,'_')+'_card.png';
    a.href=c.toDataURL('image/png'); a.click();
  });
}

/* RESET */
function resetForm(){
  document.querySelectorAll('input[type="text"],input[type="number"],textarea').forEach(el=>el.value='');
  document.querySelectorAll('select').forEach(el=>el.selectedIndex=0);
  document.querySelectorAll('.custom-input').forEach(el=>el.classList.remove('show'));
  removePhoto(); unlockGender(); stegoPayload='';
  document.getElementById('cardWrapper').classList.remove('show');
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
